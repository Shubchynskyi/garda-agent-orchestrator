# CycloneDX SBOM generation for Garda Agent Orchestrator.
# Generates a Software Bill of Materials in CycloneDX JSON format from
# package-lock.json and uploads it as a build artifact.
# Runs on push/PR to main branches, on release tags, and on manual dispatch.
name: SBOM

on:
  push:
    branches:
      - main
      - master
      - dev
      - 'release/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
      - dev
      - 'release/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  NODE_VERSION: '24'

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Generate CycloneDX SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm --output-file sbom.cdx.json --spec-version 1.5 --output-reproducible

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90
          if-no-files-found: error
