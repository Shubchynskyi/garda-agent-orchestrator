# Secret scanning for Garda Agent Orchestrator.
# Runs gitleaks to detect committed secrets on push, PR, and weekly schedule.
# Complements the runtime redaction layer (T-014) with a prevention gate.
name: Secret Scanning

on:
  push:
    branches:
      - main
      - master
      - dev
      - 'release/**'
  pull_request:
    branches:
      - main
      - master
      - dev
      - 'release/**'
  schedule:
    # Weekly scan: every Monday at 04:00 UTC (offset from security.yml).
    - cron: '0 4 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
