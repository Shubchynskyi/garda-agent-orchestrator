# CI pipeline for Garda Agent Orchestrator.
# Runs: typecheck/lint → unit tests → release quality validation matrix → cross-platform lifecycle smoke matrix.
name: CI

on:
  push:
    branches:
      - main
      - master
      - dev
      - 'release/**'
  pull_request:
    branches:
      - main
      - master
      - dev
      - 'release/**'
  workflow_dispatch:

# Cancel in-progress runs for the same PR; let push runs complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  typecheck:
    name: Static Checks / Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - '22.13.0'
          - '24'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Run typecheck
        run: npm run typecheck

      - name: Run lint
        run: npm run lint

  # ── 2. Unit test suite ───────────────────────────────────────────────────────
  test:
    name: Unit Tests / Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    needs: typecheck
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - '22.13.0'
          - '24'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Run Linux full suite with color enabled
        env:
          FORCE_COLOR: '1'
        run: npm run build:node-foundation && npm test

  # ── 3. Release validation matrix (version parity + build + quality + pack smoke)
  validate-release:
    name: Release Validation / ${{ matrix.os }} / Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        node-version:
          - '22.13.0'
          - '24'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Validate release
        run: npm run validate:release

  # ── 4. Cross-platform lifecycle smoke matrix ──────────────────────────────────
  # Runs in parallel with unit tests once typecheck passes.
  # Covers: install → init → reinit → update/doctor → uninstall on all 3 OSes.
  smoke:
    name: Smoke / ${{ matrix.os }} / Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    needs: [typecheck, test]
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        node-version:
          - '22.13.0'
          - '24'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Build
        run: npm run build

      - name: Build staged node-foundation test graph
        run: npm run build:node-foundation

      # Pack-install smoke: packs a tarball, installs it, exercises version/help/status.
      - name: Pack and install smoke test
        run: node --test .node-build/tests/node/packaging/pack-smoke.test.js

      # Lifecycle smoke using the local built CLI.
      # Stages map to: setup -> update git -> doctor -> uninstall.
      - name: Lifecycle smoke (cross-platform E2E install → update → uninstall)
        id: lifecycle-smoke
        shell: bash
        run: |
          set -euo pipefail

          SMOKE_DIR="$(mktemp -d)"
          echo "smoke_dir=$SMOKE_DIR" >> "$GITHUB_OUTPUT"
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          # Always use absolute paths in cross-platform test to avoid pathing drift
          CLI="node ${GITHUB_WORKSPACE}/bin/garda.js"

          echo "::group::1. Setup (built source checkout)"
          # First-run CI smoke must go through setup so init-answers are materialized
          # non-interactively before install/init/review commands are exercised.
          GIT_URL="file://${GITHUB_WORKSPACE}"
          # Format file URL properly for Windows (file:///D:/...) versus Unix (file:///home/...)
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            GIT_URL="file:///${GITHUB_WORKSPACE//\\//}"
          fi
          $CLI setup --target-root "$SMOKE_DIR" --no-prompt --assistant-language "English" --assistant-brevity "concise" --source-of-truth "Antigravity" --enforce-no-auto-commit false --claude-orchestrator-full-access false --token-economy-enabled true --active-agent-files ".antigravity/rules.md"
          echo "::endgroup::"

          echo "::group::2. Update (git clone flow)"
          # Exercise git-based update explicitly against the current workflow branch.
          $CLI update git --target-root "$SMOKE_DIR" --repo-url "$GIT_URL" --branch "$BRANCH_NAME" --no-prompt --trust-override
          echo "::endgroup::"

          echo "::group::3. Doctor"
          $CLI doctor --target-root "$SMOKE_DIR"
          echo "::endgroup::"

          echo "::group::4. Uninstall"
          $CLI uninstall --target-root "$SMOKE_DIR" --no-prompt
          echo "::endgroup::"

          rm -rf "$SMOKE_DIR"
          echo "Lifecycle smoke PASSED on $RUNNER_OS"

      # ── Failure forensics: upload runtime evidence and logs ──────────────────
      # Captures build output, runtime state, and npm debug logs when any smoke
      # step fails, giving investigators actionable context without re-running.
      - name: Collect smoke failure evidence
        if: failure()
        shell: bash
        run: |
          mkdir -p smoke-failure-evidence

          # npm debug logs
          for log in "$HOME"/.npm/_logs/*.log; do
            [ -f "$log" ] && cp "$log" smoke-failure-evidence/ || true
          done

          # Build output (dist manifest, compiled CLI entrypoint)
          [ -d dist ] && cp -r dist smoke-failure-evidence/dist || true
          [ -f bin/garda.js ] && cp bin/garda.js smoke-failure-evidence/ || true

          # Lifecycle smoke workspace state (if the step got far enough to create it)
          SMOKE_DIR="${{ steps.lifecycle-smoke.outputs.smoke_dir }}"
          if [ -n "$SMOKE_DIR" ] && [ -d "$SMOKE_DIR" ]; then
            # Capture orchestrator runtime artifacts and agent config
            if [ -d "$SMOKE_DIR/garda-agent-orchestrator/runtime" ]; then
              cp -r "$SMOKE_DIR/garda-agent-orchestrator/runtime" smoke-failure-evidence/smoke-runtime
            fi
            if [ -d "$SMOKE_DIR/garda-agent-orchestrator/live/config" ]; then
              cp -r "$SMOKE_DIR/garda-agent-orchestrator/live/config" smoke-failure-evidence/smoke-config
            fi
            # Capture materialized entrypoints for provider-routing diagnosis
            for f in "$SMOKE_DIR"/.antigravity/rules.md "$SMOKE_DIR"/.agents/workflows/start-task.md; do
              [ -f "$f" ] && cp "$f" smoke-failure-evidence/ || true
            done
          fi

          # Runner environment snapshot
          {
            echo "runner_os=$RUNNER_OS"
            echo "node_version=$(node --version 2>/dev/null || echo 'unavailable')"
            echo "npm_version=$(npm --version 2>/dev/null || echo 'unavailable')"
            echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || echo 'unavailable')"
            echo "smoke_dir=$SMOKE_DIR"
          } > smoke-failure-evidence/runner-env.txt

      - name: Upload smoke failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-failure-evidence-${{ matrix.os }}-node${{ matrix.node-version }}
          path: smoke-failure-evidence/
          retention-days: 15
          if-no-files-found: ignore
